<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover: draw under the status bar / home-indicator safe areas.
         maximum-scale + user-scalable=no: stop Safari page-zoom & double-tap-zoom
         from fighting tldraw's own canvas pinch-zoom. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Shared Whiteboard</title>

    <!-- Installable / full-screen on iPad: launched from the Home Screen it runs
         chromeless (no address bar, no tabs) like a native app. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Whiteboard" />
    <meta name="theme-color" content="#eef0e6" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <style>
      :root { --font-mono: 'Hurmit Nerd Font', 'Hurmit Nerd Font Mono', ui-monospace, monospace; }
      html, body, #root { margin: 0; height: 100%; }
      /* Lock the page: no rubber-band bounce, no pull-to-refresh, no page scroll —
         the canvas owns all gestures. tldraw re-enables selection where it needs it. */
      html, body {
        position: fixed;
        inset: 0;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        touch-action: manipulation;
      }
      body { font-family: var(--font-mono); background: #f7f8f1; }

      /* Touch ergonomics for the app's own top toolbar (tldraw's UI already adapts
         to touch). On a coarse pointer (iPad), grow the controls to ~44px tall —
         Apple's minimum comfortable tap target — and pad the bar past the safe area
         so nothing sits under the status bar. Scoped to .wb-chrome so the canvas is
         untouched. */
      .wb-chrome {
        padding-top: max(6px, env(safe-area-inset-top)) !important;
        padding-left: max(12px, env(safe-area-inset-left)) !important;
        padding-right: max(12px, env(safe-area-inset-right)) !important;
        user-select: none;
        -webkit-user-select: none;
      }
      @media (pointer: coarse) {
        .wb-chrome { gap: 8px !important; }
        .wb-chrome button,
        .wb-chrome select {
          min-height: 40px;
          padding-top: 8px !important;
          padding-bottom: 8px !important;
          font-size: 15px !important;
        }
        .wb-chrome .wb-chip { min-height: 34px; font-size: 13px !important; }
      }
    </style>
    <script type="module" crossorigin src="/assets/index-sb17pq8m.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-3azQ2zFp.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
